<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>KV Store Trace Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #080b10;
  --bg-primary: #0d1117;
  --bg-surface: #131820;
  --bg-raised: #1a2028;
  --border: #1e2530;
  --border-light: #2a3140;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #484f58;
  --accent: #58A6FF;
  --put: #F0883E;
  --get: #58A6FF;
  --delete: #F85149;
  --client-role: #f4b266;
  --client-role-bg: rgba(244, 178, 102, 0.14);
  --client-role-border: rgba(244, 178, 102, 0.3);
  --client-lane: rgba(244, 178, 102, 0.055);
  --node-role: #66d1a8;
  --node-role-bg: rgba(102, 209, 168, 0.14);
  --node-role-border: rgba(102, 209, 168, 0.3);
  --node-lane: rgba(102, 209, 168, 0.06);
  --font-ui: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-ui); background: var(--bg-deep); color: var(--text-primary); }

header {
  padding: 12px 24px; background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
}
h1 {
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px;
}
.controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
select {
  padding: 5px 10px; font-size: 13px; font-family: var(--font-ui);
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg-raised); color: var(--text-primary);
}
select option { background: var(--bg-raised); }
.controls button {
  padding: 4px 12px; font-size: 13px; font-family: var(--font-ui);
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg-raised); cursor: pointer; color: var(--text-secondary);
  transition: all 0.15s;
}
.controls button:hover { background: var(--border); color: var(--text-primary); }
.controls button.active {
  background: rgba(88,166,255,0.12); border-color: rgba(88,166,255,0.35);
  color: var(--accent);
}
.step-info {
  font-size: 13px; font-family: var(--font-mono); font-variant-numeric: tabular-nums;
  color: var(--text-secondary); min-width: 110px; text-align: center;
}
.speed { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
.hint { font-size: 10px; color: var(--text-muted); margin-left: auto; letter-spacing: 0.01em; }

#legend {
  padding: 6px 24px; font-size: 11px; display: flex; gap: 16px; flex-wrap: wrap;
  border-bottom: 1px solid var(--border); background: var(--bg-surface); color: var(--text-muted);
}
#legend span { display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
#legend .swatch {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
}
#legend .line-thick {
  display: inline-block; width: 16px; height: 0;
  border-top: 2.5px solid var(--text-muted); vertical-align: middle;
}
#legend .line-thin {
  display: inline-block; width: 16px; height: 0;
  border-top: 1.5px solid var(--text-muted); vertical-align: middle;
}

#detail {
  padding: 10px 24px; font-size: 14px; color: var(--text-primary);
  background: var(--bg-primary); border-bottom: 1px solid var(--border);
  min-height: 40px; display: flex; align-items: center;
  font-family: var(--font-mono); font-weight: 400; letter-spacing: -0.01em;
}
#detail.outcome { color: var(--accent); font-weight: 500; }

#progress { height: 3px; background: var(--border); }
#progress-fill {
  height: 100%; width: 0; background: var(--accent);
  transition: width 0.15s ease; border-radius: 0 2px 2px 0;
}

#svg-wrap { overflow-x: auto; padding: 24px 0; background: var(--bg-deep); }
svg { display: block; margin: 0 auto; max-width: 100%; height: auto; }

.entry { transition: opacity .15s ease; cursor: pointer; }
.entry.future { opacity: 0; pointer-events: none; }
.entry.past { opacity: .25; }
.entry.current { opacity: 1; }
.entry:hover:not(.future) { opacity: 1 !important; }

.entry.correlated:not(.future) { opacity: 1 !important; filter: url(#glow); }

.entry.anim line.arrow { animation: drawLine .28s ease-out forwards; }
@keyframes drawLine {
  from { stroke-dashoffset: var(--len); }
  to   { stroke-dashoffset: 0; }
}

.deliver-ring {
  opacity: 0; pointer-events: none;
  transform-box: fill-box; transform-origin: center;
}
.entry.anim .deliver-ring {
  animation: ringPulse .7s ease-out;
}
@keyframes ringPulse {
  0%   { opacity: .5; transform: scale(.4); }
  100% { opacity: 0;  transform: scale(1.6); }
}

#tip {
  display: none; position: fixed; pointer-events: none; z-index: 100;
  background: var(--bg-raised); color: var(--text-primary);
  padding: 10px 14px; border-radius: 8px;
  font-size: 12px; font-family: var(--font-mono); line-height: 1.6;
  max-width: 340px; border: 1px solid var(--border-light);
  box-shadow: 0 4px 24px rgba(0,0,0,.6); white-space: pre-line;
}
</style>
</head>
<body>
<header>
  <h1>KV Store &mdash; Trace Viewer</h1>
  <div class="controls">
    <select id="sel"></select>
    <button id="btnPrev" title="Previous step">&lsaquo;</button>
    <span class="step-info" id="info">Step &ndash;</span>
    <button id="btnNext" title="Next step">&rsaquo;</button>
    <button id="btnPlay" title="Play/Pause">&#9654; Play</button>
    <span class="speed" id="speedLabel">500ms</span>
    <span class="hint">&larr;&rarr; step &middot; Shift jump &middot; Space play &middot; +/&minus; speed &middot; Home/End</span>
  </div>
</header>
<div id="legend"></div>
<div id="detail">Press &rarr; to begin</div>
<div id="progress"><div id="progress-fill"></div></div>
<div id="svg-wrap"><svg id="d"></svg></div>
<div id="tip"></div>

<script>
const T = __DATA__;
const COLORS = { Put: '#F0883E', Get: '#58A6FF', Delete: '#F85149' };
const M = { t: 70, l: 80, r: 36, b: 24 };
const CW = 180, RH = 44;

let curScenario = 0, cur = -1;
let steps = [], filt = [], tsGroups = [];
let playing = false, playSpeed = 500, playTimer = null;

const $ = id => document.getElementById(id);
const NS = 'http://www.w3.org/2000/svg';
function mk(tag, a) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(a || {})) e.setAttribute(k, v);
  return e;
}
function tx(s, x, y, a) {
  const t = mk('text', { x, y, ...a }); t.textContent = s; return t;
}
function baseType(msgType) { return msgType.replace(/Req|Resp$/, ''); }
function color(msgType) { return COLORS[baseType(msgType)] || '#8b949e'; }
function isResp(msgType) { return msgType.endsWith('Resp'); }
function actorRole(name) {
  if (name.startsWith('Client ')) return 'client';
  if (name.startsWith('Node ')) return 'node';
  return 'other';
}
function actorTheme(name) {
  switch (actorRole(name)) {
    case 'client':
      return {
        lane: 'var(--client-lane)',
        guide: 'rgba(244, 178, 102, 0.24)',
        badgeBg: 'var(--client-role-bg)',
        badgeBorder: 'var(--client-role-border)',
        text: 'var(--client-role)',
      };
    case 'node':
      return {
        lane: 'var(--node-lane)',
        guide: 'rgba(102, 209, 168, 0.28)',
        badgeBg: 'var(--node-role-bg)',
        badgeBorder: 'var(--node-role-border)',
        text: 'var(--node-role)',
      };
    default:
      return {
        lane: 'rgba(255,255,255,0.02)',
        guide: '#1e2530',
        badgeBg: 'rgba(255,255,255,0.08)',
        badgeBorder: 'rgba(255,255,255,0.14)',
        text: '#c9d1d9',
      };
  }
}

// ---- Legend ----
(function() {
  const lg = $('legend');
  function add(html) { const s = document.createElement('span'); s.innerHTML = html; lg.appendChild(s); }
  add('<span class="swatch" style="background:#F0883E"></span> Put');
  add('<span class="swatch" style="background:#58A6FF"></span> Get');
  add('<span class="swatch" style="background:#F85149"></span> Delete');
  add('<span class="line-thick"></span> Request');
  add('<span class="line-thin"></span> Response');
  add('<span class="swatch" style="background:var(--client-role)"></span> Client lane');
  add('<span class="swatch" style="background:var(--node-role)"></span> Node lane');
})();

// ---- Scenario dropdown ----
const sel = $('sel');
T.forEach((s, i) => {
  const o = document.createElement('option'); o.value = i; o.textContent = s.name;
  sel.appendChild(o);
});
sel.onchange = () => { stopPlay(); load(+sel.value); };

// ---- Keyboard ----
document.onkeydown = e => {
  if (e.target.tagName === 'SELECT') return;
  switch (e.key) {
    case 'ArrowRight':
      e.shiftKey ? go(tsStep(1)) : go(cur + 1); e.preventDefault(); break;
    case 'ArrowLeft':
      e.shiftKey ? go(tsStep(-1)) : go(cur - 1); e.preventDefault(); break;
    case 'Home': go(-1); e.preventDefault(); break;
    case 'End': go(filt.length - 1); e.preventDefault(); break;
    case ' ': togglePlay(); e.preventDefault(); break;
    case '+': case '=': changeSpeed(-100); e.preventDefault(); break;
    case '-': case '_': changeSpeed(100); e.preventDefault(); break;
  }
};

$('btnPrev').onclick = () => go(cur - 1);
$('btnNext').onclick = () => go(cur + 1);
$('btnPlay').onclick = () => togglePlay();

function togglePlay() {
  if (playing) { stopPlay(); return; }
  playing = true;
  $('btnPlay').innerHTML = '\u23F8 Pause';
  $('btnPlay').classList.add('active');
  playTimer = setInterval(() => {
    if (cur >= filt.length - 1) { stopPlay(); return; }
    go(cur + 1);
  }, playSpeed);
}
function stopPlay() {
  playing = false; clearInterval(playTimer);
  $('btnPlay').innerHTML = '\u25B6 Play';
  $('btnPlay').classList.remove('active');
}
function changeSpeed(delta) {
  playSpeed = Math.max(50, Math.min(2000, playSpeed + delta));
  $('speedLabel').textContent = playSpeed + 'ms';
  if (playing) { stopPlay(); togglePlay(); }
}

function tsStep(dir) {
  if (!tsGroups.length) return cur;
  let gi = tsGroups.findIndex(g => cur >= g.s && cur <= g.e);
  if (gi < 0) gi = dir > 0 ? -1 : tsGroups.length;
  const t = gi + dir;
  if (t < 0) return -1;
  if (t >= tsGroups.length) return filt.length - 1;
  return tsGroups[t].e;
}

// ---- Tooltip ----
const tip = $('tip');
function showTip(e, evt) {
  let t = '';
  if (e.kind === 'send')
    t = `${e.from} \u2192 ${e.to}\n${e.detail}\nSent t=${e.at}, arrives t=${e.deliver_at}\nrequest#${e.requestId}`;
  else if (e.kind === 'deliver')
    t = `${e.to} receives from ${e.from}\n${e.detail}\nt=${e.at}\nrequest#${e.requestId}`;
  tip.textContent = t; tip.style.display = 'block'; moveTip(evt);
}
function moveTip(evt) {
  tip.style.left = (evt.clientX + 14) + 'px';
  tip.style.top = (evt.clientY + 14) + 'px';
}
function hideTip() { tip.style.display = 'none'; }

// ---- Load scenario ----
function load(idx) {
  curScenario = idx; cur = -1;
  const sc = T[idx];
  filt = sc.entries;

  // Timestamps
  const ts = new Set();
  filt.forEach(e => { ts.add(e.at); if (e.deliver_at != null) ts.add(e.deliver_at); });
  const times = [...ts].sort((a, b) => a - b);
  const ti = Object.fromEntries(times.map((t, i) => [t, i]));

  // Timestamp groups
  tsGroups = [];
  if (filt.length) {
    let gs = 0;
    for (let i = 1; i <= filt.length; i++) {
      if (i === filt.length || filt[i].at !== filt[gs].at) {
        tsGroups.push({ s: gs, e: i - 1 }); gs = i;
      }
    }
  }

  const nc = sc.actors.length, nr = times.length;
  const ci = Object.fromEntries(sc.actors.map((a, i) => [a, i]));
  const cx = i => M.l + i * CW + CW / 2;

  // Row Y positions with time-gap spacing
  const rowY = [], gapBefore = new Set();
  let yy = M.t;
  for (let i = 0; i < nr; i++) {
    if (i > 0 && times[i] - times[i - 1] > 2) { yy += 14; gapBefore.add(i); }
    rowY.push(yy + RH / 2); yy += RH;
  }
  const W = M.l + nc * CW + M.r, H = yy + M.b;
  const ry = i => rowY[i];

  const d = $('d');
  d.setAttribute('viewBox', `0 0 ${W} ${H}`);
  d.setAttribute('width', W);
  d.innerHTML = '';

  // ---- Defs: markers + glow filter ----
  const defs = mk('defs');
  for (const [n, c] of Object.entries(COLORS)) {
    const m = mk('marker', {
      id: 'a-' + n, viewBox: '0 0 10 10', refX: 9, refY: 5,
      markerWidth: 6, markerHeight: 6, orient: 'auto'
    });
    m.appendChild(mk('path', { d: 'M0,1L9,5L0,9z', fill: c }));
    defs.appendChild(m);
  }
  // Glow filter for correlation highlight
  const gf = mk('filter', { id: 'glow', x: '-50%', y: '-50%', width: '200%', height: '200%' });
  gf.appendChild(mk('feGaussianBlur', { in: 'SourceGraphic', stdDeviation: '3', result: 'blur' }));
  const gm = mk('feMerge');
  gm.appendChild(mk('feMergeNode', { in: 'blur' }));
  gm.appendChild(mk('feMergeNode', { in: 'SourceGraphic' }));
  gf.appendChild(gm);
  defs.appendChild(gf);
  d.appendChild(defs);

  // ---- Column shading ----
  for (let i = 0; i < nc; i++) {
    const theme = actorTheme(sc.actors[i]);
    d.appendChild(mk('rect', {
      x: M.l + i * CW, y: M.t - 14, width: CW, height: H - M.b - M.t + 14,
      fill: theme.lane
    }));
  }

  // ---- Dot grid ----
  for (let r = 0; r < nr; r++) {
    for (let c = 0; c < nc; c++) {
      d.appendChild(mk('circle', {
        cx: cx(c), cy: ry(r), r: 1.2, fill: '#1e2530'
      }));
    }
  }

  // ---- Time labels ----
  for (let i = 0; i < nr; i++) {
    d.appendChild(tx('t=' + times[i], M.l - 12, ry(i), {
      'font-size': 12, fill: '#3d4450', 'text-anchor': 'end', 'dominant-baseline': 'central',
      'font-family': "'JetBrains Mono', monospace"
    }));
  }

  // ---- Time-gap indicators ----
  gapBefore.forEach(i => {
    const midY = (rowY[i - 1] + rowY[i]) / 2;
    d.appendChild(tx('\u22EE', M.l - 12, midY, {
      'font-size': 14, fill: '#2a3140', 'text-anchor': 'end', 'dominant-baseline': 'central'
    }));
    d.appendChild(mk('line', {
      x1: M.l, y1: midY, x2: W - M.r, y2: midY,
      stroke: '#1e2530', 'stroke-width': 1, 'stroke-dasharray': '3 3'
    }));
  });

  // ---- Request extent bars (left gutter) ----
  const requestGroups = {};
  filt.forEach(e => {
    const k = e.clientId + ':' + e.requestId;
    if (!requestGroups[k]) requestGroups[k] = { clientId: e.clientId, rows: [], type: e.msgType };
    requestGroups[k].rows.push(ti[e.at]);
    if (e.deliver_at != null && ti[e.deliver_at] != null) requestGroups[k].rows.push(ti[e.deliver_at]);
  });
  const clientList = [...new Set(filt.map(e => e.clientId))].sort((a, b) => a - b);
  const barW = 4, barGap = 3;
  for (const request of Object.values(requestGroups)) {
    const minR = Math.min(...request.rows), maxR = Math.max(...request.rows);
    const y1 = ry(minR), y2 = ry(maxR);
    const ci_idx = clientList.indexOf(request.clientId);
    const x = 8 + ci_idx * (barW + barGap);
    const c = COLORS[baseType(request.type)] || '#8b949e';
    d.appendChild(mk('rect', {
      x, y: y1 - 3, width: barW, height: Math.max(y2 - y1 + 6, 6),
      fill: c, opacity: .3, rx: 2
    }));
  }

  // ---- Actor lanes ----
  for (let i = 0; i < nc; i++) {
    const x = cx(i);
    const theme = actorTheme(sc.actors[i]);
    d.appendChild(mk('line', {
      x1: x, y1: M.t - 6, x2: x, y2: H - M.b,
      stroke: theme.guide, 'stroke-width': 1, 'stroke-dasharray': '4 4'
    }));
  }

  // ---- Actor header badges ----
  for (let i = 0; i < nc; i++) {
    const x = cx(i), name = sc.actors[i];
    const theme = actorTheme(name);
    const w = name.length * 7.2 + 22;
    d.appendChild(mk('rect', {
      x: x - w / 2, y: M.t - 44, width: w, height: 24,
      fill: theme.badgeBg, stroke: theme.badgeBorder, 'stroke-width': 1, rx: 12
    }));
    d.appendChild(tx(name, x, M.t - 32, {
      'font-size': 12, 'font-weight': 600, fill: theme.text, 'text-anchor': 'middle',
      'dominant-baseline': 'central', 'font-family': "'DM Sans', sans-serif"
    }));
  }

  // ---- Entries ----
  const sendOff = {};
  steps = [];

  filt.forEach((e, idx) => {
    const g = mk('g', { class: 'entry future', 'data-kind': e.kind });
    const c = color(e.msgType);

    if (e.kind === 'send') {
      const x1 = cx(ci[e.from]), y1 = ry(ti[e.at]);
      const x2 = cx(ci[e.to]),   y2 = ry(ti[e.deliver_at]);
      const resp = isResp(e.msgType);
      const sw = resp ? 1.5 : 2.5;
      const len = Math.hypot(x2 - x1, y2 - y1);
      const bt = baseType(e.msgType);

      const line = mk('line', {
        x1, y1, x2, y2, stroke: c, 'stroke-width': sw,
        'marker-end': 'url(#a-' + bt + ')', class: 'arrow'
      });
      line.style.strokeDasharray = len;
      line.style.strokeDashoffset = 0;
      line.style.setProperty('--len', len);
      g.appendChild(line);

      g.appendChild(mk('circle', { cx: x1, cy: y1, r: resp ? 2.5 : 3.5, fill: c }));

      // Staggered label
      const sk = e.from + ':' + e.at;
      const off = (sendOff[sk] || 0) * 14;
      sendOff[sk] = (sendOff[sk] || 0) + 1;
      const mx = (x1 + x2) / 2, my = (y1 + y2) / 2, right = x2 > x1;
      g.appendChild(tx(e.label, mx + (right ? 14 : -14), my - 6 + off, {
        'font-size': 11, fill: c, 'text-anchor': right ? 'start' : 'end',
        'font-family': "'JetBrains Mono', monospace", opacity: resp ? .7 : 1
      }));

    } else if (e.kind === 'deliver') {
      const x = cx(ci[e.to]), y = ry(ti[e.at]);
      const resp = isResp(e.msgType);

      if (resp) {
        // Diamond for response delivery
        const s = 5;
        g.appendChild(mk('polygon', {
          points: `${x},${y-s} ${x+s},${y} ${x},${y+s} ${x-s},${y}`,
          fill: c, stroke: '#0d1117', 'stroke-width': 1.5
        }));
      } else {
        // Circle for request delivery
        g.appendChild(mk('circle', {
          cx: x, cy: y, r: 5.5, fill: c, stroke: '#0d1117', 'stroke-width': 1.5
        }));
      }

      // Pulse ring (animated on forward step)
      g.appendChild(mk('circle', {
        cx: x, cy: y, r: 14, fill: 'none', stroke: c, 'stroke-width': 1.5,
        class: 'deliver-ring'
      }));
    }

    // Hover: tooltip + correlation glow
    g.addEventListener('mouseenter', evt => {
      showTip(e, evt);
      steps.forEach((g2, j) => {
        if (j !== idx && filt[j].clientId === e.clientId && filt[j].requestId === e.requestId)
          g2.classList.add('correlated');
      });
    });
    g.addEventListener('mousemove', moveTip);
    g.addEventListener('mouseleave', () => {
      hideTip();
      steps.forEach(g2 => g2.classList.remove('correlated'));
    });
    g.addEventListener('click', () => { stopPlay(); go(idx); });

    d.appendChild(g);
    steps.push(g);
  });

  go(readHash().scenario === idx ? readHash().step : -1);
}

// ---- Description ----
function desc(e) {
  if (e.kind === 'send')
    return `t=${e.at}  ${e.from} \u2192 ${e.to}: ${e.label}  (arrives t=${e.deliver_at})`;
  if (e.kind === 'deliver')
    return `t=${e.at}  ${e.to} receives ${e.label} from ${e.from}`;
  return '';
}

function outcomeText() {
  const r = T[curScenario].result;
  if (!r) return '';
  const parts = r.clients.map(c => `${c.id}: ${c.requests} requests`).join(', ');
  return `Completed: ${r.total} requests \u00B7 ${parts}`;
}

// ---- Step management ----
function go(s) {
  const prev = cur;
  s = Math.max(-1, Math.min(s, filt.length - 1));
  cur = s;
  const last = s === filt.length - 1;
  const forward = s > prev;

  steps.forEach((el, i) => {
    el.classList.remove('past', 'current', 'future', 'anim');
    if (last || i === s) {
      el.classList.add('current');
      if (forward && i === s && !last) el.classList.add('anim');
    } else if (i < s) {
      el.classList.add('past');
    } else {
      el.classList.add('future');
    }
  });

  $('info').textContent = s < 0
    ? `Step \u2013 / ${filt.length}`
    : `Step ${s + 1} / ${filt.length}`;

  // Progress bar
  const pct = s < 0 ? 0 : ((s + 1) / filt.length * 100);
  $('progress-fill').style.width = pct + '%';

  const detail = $('detail');
  if (s < 0) {
    detail.textContent = 'Press \u2192 to begin';
    detail.classList.remove('outcome');
  } else if (last) {
    detail.textContent = outcomeText() || desc(filt[s]);
    detail.classList.add('outcome');
  } else {
    detail.textContent = desc(filt[s]);
    detail.classList.remove('outcome');
  }
  writeHash();
}

// ---- URL hash ----
function readHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  return { scenario: parseInt(p.get('s') || '0'), step: parseInt(p.get('t') || '-1') };
}
function writeHash() {
  history.replaceState(null, '', `#s=${curScenario}&t=${cur}`);
}
window.addEventListener('hashchange', () => {
  const h = readHash();
  if (h.scenario !== curScenario) { sel.value = h.scenario; load(h.scenario); }
  else if (h.step !== cur) go(h.step);
});

const init = readHash();
sel.value = init.scenario;
load(init.scenario);
</script>
</body>
